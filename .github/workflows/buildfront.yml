name: Build Front

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build-front-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: frontend/node_modules
          key: frontend-node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Build Angular project
        run: npm run build -- --base-href /gis-webview/

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-front-${{ github.ref }}
      cancel-in-progress: true

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4